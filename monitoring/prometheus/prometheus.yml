# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: "rtam-local"
    environment: "development"

# --- Alert Rules ---
rule_files:
  - "alert_rules.yml"

# --- Alertmanager ---
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# --- Scrape Targets ---
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # FastAPI application metrics
  - job_name: "rtam-api"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "rtam-api"
          environment: "development"

  # PostgreSQL exporter (future)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
