# =============================================================================
# Grafana — Dashboard Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: "RTAM Dashboards"
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
