# =============================================================================
# Alertmanager Configuration
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'anandchowdary37@gmail.com'
  smtp_auth_username: 'anandchowdary37@gmail.com'
  smtp_auth_password: 'eire gopn bfzu bfjj'
  smtp_require_tls: true

route:
  receiver: 'email-alerts'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: 'email-alerts'
      group_wait: 10s
      repeat_interval: 30m

receivers:
  - name: 'email-alerts'
    email_configs:
      - to: 'anandchowdary37@gmail.com'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
